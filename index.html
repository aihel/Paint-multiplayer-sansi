<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>PRO Paint</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

#login, #lobby, #game { display:none; }

.user {
  display:flex;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.user img {
  width:40px; height:40px; border-radius:50%; margin-right:10px;
}

canvas { background:#fff; }

#toolbar {
  position:absolute; left:0; top:0; background:#222; padding:10px;
}

#brushMenu { display:none; }

#chat {
  position:fixed;
  bottom:0;
  width:100%;
  background:#222;
}

.bubble {
  position:absolute;
  top:-25px;
  left:0;
  background:#fff;
  color:#000;
  padding:5px;
  border-radius:10px;
}

.closeBtn { cursor:pointer; color:red; margin-left:5px; }
</style>
</head>

<body>

<div id="login">
  <h2>Profil</h2>
  <input id="username" placeholder="Ad">
  <input type="file" id="photo">
  <button onclick="enter()">Gir</button>
</div>

<div id="lobby">
  <h2>Lobby</h2>
  <div id="users"></div>
</div>

<div id="game">
  <canvas id="c" width="800" height="500"></canvas>

  <div id="toolbar">
    <button onclick="toggleBrush()">></button>
    <div id="brushMenu">
      <input type="color" id="color">
      <input type="range" id="size" min="1" max="30">
      <select id="brushType">
        <option value="square">Kare</option>
        <option value="circle">Yuvarlak</option>
        <option value="spray">Spray</option>
      </select>
    </div>
  </div>
</div>

<div id="chat">
  <div id="messages"></div>
  <input id="msg">
  <button onclick="sendMsg()">Gönder</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, onChildAdded, remove }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVMvgD3u-UT5dAk72pXqLub05qNPjqPW8",
  authDomain: "dsohbet.firebaseapp.com",
  databaseURL: "https://dsohbet-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dsohbet",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myId = Math.random().toString(36).substr(2,9);
let username="", photo="", roomId=null;

// GİRİŞ
window.enter=()=>{
  username=document.getElementById("username").value;
  const file=document.getElementById("photo").files[0];

  const r=new FileReader();
  r.onload=e=>{
    photo=e.target.result;

    set(ref(db,"users/"+myId),{
      name:username, photo:photo, last:Date.now()
    });

    document.getElementById("login").style.display="none";
    document.getElementById("lobby").style.display="block";
  };

  if(file) r.readAsDataURL(file);
};

// AFK temizleme
setInterval(()=>{
  onValue(ref(db,"users"),snap=>{
    const u=snap.val();
    for(let id in u){
      if(Date.now()-u[id].last>20000){
        remove(ref(db,"users/"+id));
      }
    }
  });
},10000);

// LOBBY
onValue(ref(db,"users"),snap=>{
  const users=snap.val();
  const div=document.getElementById("users");
  div.innerHTML="";

  for(let id in users){
    if(id===myId) continue;

    const u=users[id];

    const el=document.createElement("div");
    el.className="user";

    el.innerHTML=`
      <img src="${u.photo}">
      <span>${u.name}</span>
    `;

    el.onclick=()=>{
      if(confirm(u.name+" davet edilsin mi?")){
        set(ref(db,"invites/"+id),{
          from:myId, name:username, photo:photo
        });
      }
    };

    div.appendChild(el);
  }
});

// DAVET ALMA
onValue(ref(db,"invites/"+myId),snap=>{
  const inv=snap.val();
  if(!inv) return;

  if(confirm(inv.name+" seni davet etti")){
    roomId=Math.random().toString(36);
    set(ref(db,"rooms/"+roomId+"/players/"+myId),true);
    set(ref(db,"rooms/"+roomId+"/players/"+inv.from),true);

    startGame();
  }
});

// OYUN
function startGame(){
  document.getElementById("lobby").style.display="none";
  document.getElementById("game").style.display="block";
}

// CANVAS
const c=document.getElementById("c");
const ctx=c.getContext("2d");

let drawing=false;

c.onmousedown=()=>drawing=true;
c.onmouseup=()=>drawing=false;

c.onmousemove=e=>{
  if(!drawing || !roomId) return;

  const x=e.offsetX, y=e.offsetY;
  const color=document.getElementById("color").value||"#000";
  const size=document.getElementById("size").value||5;
  const type=document.getElementById("brushType").value;

  draw(x,y,color,size,type);

  push(ref(db,"rooms/"+roomId+"/draw"),{x,y,color,size,type});
};

function draw(x,y,color,size,type){
  ctx.fillStyle=color;

  if(type==="square") ctx.fillRect(x,y,size,size);

  if(type==="circle"){
    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fill();
  }

  if(type==="spray"){
    for(let i=0;i<10;i++){
      ctx.fillRect(x+Math.random()*size,y+Math.random()*size,1,1);
    }
  }
}

// DİĞER OYUNCU
onChildAdded(ref(db,"rooms"),snap=>{
  const room=snap.val();
});

// CHAT
window.sendMsg=()=>{
  if(!roomId) return;

  const text=document.getElementById("msg").value;

  push(ref(db,"rooms/"+roomId+"/chat"),{
    user:username, text:text
  });
};

// MESAJ
onChildAdded(ref(db,"rooms/"+roomId+"/chat"),snap=>{
  const d=snap.val();

  const div=document.createElement("div");

  div.innerHTML=`
    <b>${d.user}</b>: ${d.text}
    <div class="bubble">
      ${d.text}
      <span class="closeBtn" onclick="this.parentElement.remove()">x</span>
    </div>
  `;

  document.getElementById("messages").appendChild(div);
});

// Menü
window.toggleBrush=()=>{
  const m=document.getElementById("brushMenu");
  m.style.display=m.style.display==="block"?"none":"block";
};

// başlat
document.getElementById("login").style.display="block";

</script>
</body>
</html>
