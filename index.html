<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Paint PRO MAX</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

.page { display:none; padding:20px; }

.user {
  display:flex;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.user img {
  width:40px; height:40px; border-radius:50%; margin-right:10px;
}

canvas { background:#fff; }

#chat { position:fixed; bottom:0; width:100%; background:#222; display:none; }

.bubble {
  position:absolute;
  top:-25px;
  left:0;
  background:#fff;
  color:#000;
  padding:5px;
  border-radius:10px;
}

</style>
</head>

<body>

<div id="login" class="page">
  <h2>Profil</h2>
  <input id="name" placeholder="Ad">
  <input type="file" id="photo">
  <button onclick="login()">Gir</button>
</div>

<div id="lobby" class="page">
  <h2>Lobby</h2>
  <div id="users"></div>
</div>

<div id="game" class="page">
  <canvas id="c" width="800" height="500"></canvas>
</div>

<div id="chat">
  <div id="messages"></div>
  <input id="msg">
  <button onclick="sendMsg()">Gönder</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, onChildAdded, remove }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVMvgD3u-UT5dAk72pXqLub05qNPjqPW8",
  authDomain: "dsohbet.firebaseapp.com",
  databaseURL: "https://dsohbet-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dsohbet"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myId=Math.random().toString(36).substr(2,9);
let username="", photo="", roomId=null;

// SAYFA GECİS
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

// LOGIN
window.login=()=>{
  username=document.getElementById("name").value;
  const file=document.getElementById("photo").files[0];

  const r=new FileReader();
  r.onload=e=>{
    photo=e.target.result;

    set(ref(db,"users/"+myId),{
      name:username, photo:photo, last:Date.now()
    });

    show("lobby");
  };

  if(file) r.readAsDataURL(file);
};

// LOBBY
onValue(ref(db,"users"),snap=>{
  const users=snap.val();
  const div=document.getElementById("users");
  div.innerHTML="";

  for(let id in users){
    if(id===myId) continue;

    const u=users[id];

    const el=document.createElement("div");
    el.className="user";

    el.innerHTML=`<img src="${u.photo}">${u.name}`;

    el.onclick=()=>{
      if(confirm("Davet gönderilsin mi?")){
        set(ref(db,"invites/"+id),{
          from:myId, name:username
        });
      }
    };

    div.appendChild(el);
  }
});

// DAVET
onValue(ref(db,"invites/"+myId),snap=>{
  const inv=snap.val();
  if(!inv) return;

  if(confirm(inv.name+" seni davet etti")){
    roomId=Math.random().toString(36);

    set(ref(db,"rooms/"+roomId+"/players/"+myId),true);
    set(ref(db,"rooms/"+roomId+"/players/"+inv.from),true);

    startGame();
  }
});

// GAME
function startGame(){
  show("game");
  document.getElementById("chat").style.display="block";
  startVoice();
}

// CANVAS
const c=document.getElementById("c");
const ctx=c.getContext("2d");

let drawing=false;

c.onmousedown=()=>drawing=true;
c.onmouseup=()=>drawing=false;

c.onmousemove=e=>{
  if(!drawing || !roomId) return;

  const x=e.offsetX, y=e.offsetY;

  ctx.fillRect(x,y,5,5);

  push(ref(db,"rooms/"+roomId+"/draw"),{x,y});
};

onChildAdded(ref(db,"rooms"),()=>{});

// CHAT
window.sendMsg=()=>{
  const text=document.getElementById("msg").value;

  push(ref(db,"rooms/"+roomId+"/chat"),{
    user:username, text:text
  });
};

onChildAdded(ref(db,"rooms/"+roomId+"/chat"),snap=>{
  const d=snap.val();

  const div=document.createElement("div");

  div.innerHTML=`${d.user}: ${d.text}
  <div class="bubble">${d.text}</div>`;

  document.getElementById("messages").appendChild(div);
});

// 🎤 VOICE CHAT (basit)
let stream;

async function startVoice(){
  stream = await navigator.mediaDevices.getUserMedia({ audio:true });

  const audio=document.createElement("audio");
  audio.srcObject=stream;
  audio.autoplay=true;
}

// START
show("login");

</script>
</body>
</html>
