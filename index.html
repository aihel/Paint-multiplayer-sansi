<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Multiplayer paint sjkicem sanki isim gucum yok</title>

<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; background:#0f172a; color:white; }

/* SIDEBAR */
#sidebar { width:220px; background:#020617; padding:10px; }
.user { display:flex; align-items:center; padding:8px; border-radius:10px; cursor:pointer; }
.user img { width:35px; height:35px; border-radius:50%; margin-right:10px; }
.talking { box-shadow:0 0 10px lime; }

/* MAIN */
#main { flex:1; display:flex; flex-direction:column; }
#canvasBox { flex:1; display:flex; justify-content:center; align-items:center; position:relative; }
canvas { background:white; border-radius:10px; }
#brushPanel { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; display:flex; flex-direction:column; gap:10px; }

/* CHAT */
#chat { width:300px; background:#020617; display:flex; flex-direction:column; }
#messages { flex:1; overflow:auto; }
.msg { padding:5px; }

/* CONTROLS */
#controls { height:60px; display:flex; justify-content:center; gap:20px; background:#020617; align-items:center; }
.btn { padding:10px; border-radius:10px; background:#1e293b; cursor:pointer; }
.active { background:#16a34a !important; }

input[type=color], input[type=range] { cursor:pointer; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>Oyuncular</h3>
  <div id="users"></div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="canvasBox">
    <canvas id="c" width="800" height="500"></canvas>
    <div id="brushPanel">
      <label>Renk: <input type="color" id="brushColor" value="#000000"></label>
      <label>Kalınlık: <input type="range" id="brushSize" min="1" max="50" value="5"></label>
      <label>Opaklık: <input type="range" id="brushAlpha" min="0" max="1" step="0.05" value="1"></label>
      <label>Fırça: 
        <select id="brushType">
          <option value="round">Yuvarlak</option>
          <option value="square">Kare</option>
          <option value="line">Çizgi</option>
        </select>
      </label>
      <div>
        <button id="undoBtn" class="btn">Undo</button>
        <button id="redoBtn" class="btn">Redo</button>
      </div>
    </div>
  </div>

  <div id="controls">
    <div id="micBtn" class="btn">🎤</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div id="messages"></div>
  <input id="msg">
  <button onclick="sendMsg()">Gönder</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, onChildAdded }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA3c63JOhpWcYkcEkiAjuZQIFqq_SJeXNM",
  authDomain: "painntt-6a376.firebaseapp.com",
  projectId: "painntt-6a376"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// USER
let myId=Math.random().toString(36).substr(2,9);
let username="User"+Math.floor(Math.random()*1000);

set(ref(db,"users/"+myId),{name:username});

onValue(ref(db,"users"),snap=>{
  const users=snap.val();
  const div=document.getElementById("users");
  div.innerHTML="";
  for(let id in users){
    const u=users[id];
    const el=document.createElement("div");
    el.className="user";
    el.id="user-"+id;
    el.innerHTML=`<img src="https://i.pravatar.cc/40?u=${id}">${u.name}`;
    div.appendChild(el);
  }
});

// 🔥 CANVAS FULL BRUSH
const c=document.getElementById("c");
const ctx=c.getContext("2d");

let drawing=false;
let undoStack=[];
let redoStack=[];

let brush={color:"#000", size:5, alpha:1, type:"round"};

function setBrush(){
  brush.color=document.getElementById("brushColor").value;
  brush.size=document.getElementById("brushSize").value;
  brush.alpha=document.getElementById("brushAlpha").value;
  brush.type=document.getElementById("brushType").value;
}

["brushColor","brushSize","brushAlpha","brushType"].forEach(id=>{
  document.getElementById(id).addEventListener("input", setBrush);
});

function saveState(){
  undoStack.push(c.toDataURL());
  if(undoStack.length>20) undoStack.shift();
}

document.getElementById("undoBtn").onclick=()=>{
  if(undoStack.length>0){
    redoStack.push(c.toDataURL());
    const img=new Image();
    img.src=undoStack.pop();
    img.onload=()=>ctx.drawImage(img,0,0);
  }
};
document.getElementById("redoBtn").onclick=()=>{
  if(redoStack.length>0){
    undoStack.push(c.toDataURL());
    const img=new Image();
    img.src=redoStack.pop();
    img.onload=()=>ctx.drawImage(img,0,0);
  }
};

c.onmousedown=e=>{
  drawing=true;
  saveState();
};
c.onmouseup=e=>drawing=false;

c.onmousemove=e=>{
  if(!drawing) return;
  let x=e.offsetX, y=e.offsetY;

  ctx.globalAlpha=brush.alpha;
  ctx.fillStyle=brush.color;
  ctx.strokeStyle=brush.color;
  ctx.lineWidth=brush.size;

  if(brush.type==="round"){
    ctx.beginPath();
    ctx.arc(x,y,brush.size/2,0,Math.PI*2);
    ctx.fill();
  } else if(brush.type==="square"){
    ctx.fillRect(x-brush.size/2,y-brush.size/2,brush.size,brush.size);
  } else if(brush.type==="line"){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+1,y+1);
    ctx.stroke();
  }

  push(ref(db,"draw"),{x,y,brush});
};

onChildAdded(ref(db,"draw"),snap=>{
  const d=snap.val();
  ctx.globalAlpha=d.brush.alpha;
  ctx.fillStyle=d.brush.color;
  ctx.strokeStyle=d.brush.color;
  ctx.lineWidth=d.brush.size;

  if(d.brush.type==="round"){
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.brush.size/2,0,Math.PI*2);
    ctx.fill();
  } else if(d.brush.type==="square"){
    ctx.fillRect(d.x-d.brush.size/2,d.y-d.brush.size/2,d.brush.size,d.brush.size);
  } else if(d.brush.type==="line"){
    ctx.beginPath();
    ctx.moveTo(d.x,d.y);
    ctx.lineTo(d.x+1,d.y+1);
    ctx.stroke();
  }
});

// 💬 CHAT
window.sendMsg=()=>{
  const text=document.getElementById("msg").value;
  push(ref(db,"chat"),{user:username,text});
};

onChildAdded(ref(db,"chat"),snap=>{
  const d=snap.val();
  const div=document.createElement("div");
  div.className="msg";
  div.innerText=d.user+": "+d.text;
  document.getElementById("messages").appendChild(div);
});

// 🎤 VOICE CHAT
let pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
let stream;
let micOn=false;

document.getElementById("micBtn").onclick=async ()=>{
  if(!micOn){
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>pc.addTrack(t,stream));
    document.getElementById("micBtn").classList.add("active");
    micOn=true;
  } else {
    stream.getTracks()[0].enabled=false;
    document.getElementById("micBtn").classList.remove("active");
    micOn=false;
  }
};

</script>
</body>
</html>
